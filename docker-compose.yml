version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: kiro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 4000mb --maxmemory-policy allkeys-lru --loglevel verbose --tcp-keepalive 300 --tcp-backlog 511
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: kiro-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build: .
    container_name: kiro-api
    network_mode: bridge
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 114.114.114.114
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5431:5431"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=postgres
      # Uvicorn配置 - 针对每秒200并发的高负载场景
      - UVICORN_WORKERS=32
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=5431
      - UVICORN_LIMIT_CONCURRENCY=2000
      - UVICORN_TIMEOUT_KEEP_ALIVE=300
      - UVICORN_BACKLOG=16384
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
